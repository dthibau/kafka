# ── Redpanda Console ─────────────────────────────────────────────────────────

  redpanda-console:
    image: redpandadata/console:v3.5.3
    container_name: redpanda-console
    restart: unless-stopped
    depends_on:
      kafka-0:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./console-config.yaml:/etc/console/config.yaml
    environment:
      - CONFIG_FILEPATH=/etc/console/config.yaml
    ports:
      - "8080:8080"
    networks:
      - kafka-net

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    container_name: schema-registry
    ports:
      - "8081:8085"
    restart: unless-stopped
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka-0:9092,PLAINTEXT://kafka-1:9092'
      SCHEMA_REGISTRY_HOST_NAME: 'schema-registry'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8085'
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: 'INFO'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 4
    networks:
      - kafka-net

# ── Named volumes (dédiés au lab ACL — pas ceux des labs SASL/OAuth) ─────────

volumes:
  kafka-0-data:
    name: acl-kafka-0-data
  kafka-1-data:
    name: acl-kafka-1-data
  kafka-2-data:
    name: acl-kafka-2-data

# ── Network ──────────────────────────────────────────────────────────────────

networks:
  kafka-net:
    driver: bridge
