      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092,BROKER://kafka-2:9091,EXTERNAL://localhost:19093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,BROKER:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_SSL"
