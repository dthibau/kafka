kafka:
  brokers:
    - kafka-0:9092
    - kafka-1:9092
    - kafka-2:9092
schemaRegistry:
  enabled: true
  urls:
    - http://schema-registry:8085

# Ajout de la section Kafka Connect
kafkaConnect:
  enabled: true
  clusters:
    - name: "cluster-connect"
      url: "http://kafka-connect:8083"
      
server:
  listenPort: 8080