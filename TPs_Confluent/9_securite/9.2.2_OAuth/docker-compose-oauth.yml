      KAFKA_SASL_OAUTHBEARER_TOKEN_ENDPOINT_URL: http://keycloak:9090/realms/kafka/protocol/openid-connect/token
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:9090/realms/kafka/protocol/openid-connect/certs
      KAFKA_SASL_OAUTHBEARER_EXPECTED_ISSUER: http://localhost:9090/realms/kafka
      KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka-broker

