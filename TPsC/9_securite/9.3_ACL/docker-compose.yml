# ── Atelier 9.3 — Kafka + OAuth/OAUTHBEARER + ACLs ──────────────────────────
#
# Basé sur le lab 9.2.2 (OAuth/Keycloak) avec ajout des ACLs.
#
# 3 brokers KRaft (apache/kafka:4.2.0)
#   - PLAINTEXT:9092       → healthcheck interne + kafka-acls admin (non exposé)
#   - BROKER:9091           → inter-broker SASL_PLAINTEXT / OAUTHBEARER
#   - CONTROLLER:9093       → controller SASL_PLAINTEXT / OAUTHBEARER
#   - EXTERNAL:19092        → clients externes SASL_SSL / OAUTHBEARER
#
# Keycloak (quay.io/keycloak:26.1) sur port 9090
# Redpanda Console sur port 8080
# Schema Registry sur port 8081
#
# ACL :
#   - StandardAuthorizer activé
#   - super.users = User:kafka-broker (broker + controller)
#   - allow.everyone.if.no.acl.found = true (autorisé par défaut si pas d'ACL)
#   - sub claim = azp → le client ID Keycloak sert de principal Kafka
# ──────────────────────────────────────────────────────────────────────────────

services:

# ── Keycloak ─────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    hostname: keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-port=9090
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: false
    volumes:
      - ./keycloak/kafka-realm.json:/opt/keycloak/data/import/kafka-realm.json:ro
    ports:
      - "9090:9090"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090 && echo -e 'GET /realms/kafka HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

# ── Kafka Broker 0 ───────────────────────────────────────────────────────────

  kafka-0:
    image: apache/kafka:4.2.0
    container_name: kafka-0
    hostname: kafka-0
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      # Node identity
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: "OAuthKafkaCluster0001AA"

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,BROKER://0.0.0.0:9091,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-0:9092,BROKER://kafka-0:9091,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,BROKER:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT,EXTERNAL:SASL_SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # KRaft quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093"

      # Broker / topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # --- SSL Configuration (EXTERNAL listener) ---
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: secret
      KAFKA_SSL_KEY_PASSWORD: secret
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: secret
      KAFKA_SSL_CLIENT_AUTH: requested
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:

      # Log storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # --- SASL / OAUTHBEARER Configuration ---
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: OAUTHBEARER
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: OAUTHBEARER
      KAFKA_SASL_ENABLED_MECHANISMS: OAUTHBEARER

      # BROKER listener — inter-broker : login + validation
      KAFKA_LISTENER_NAME_BROKER_OAUTHBEARER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
      KAFKA_LISTENER_NAME_BROKER_OAUTHBEARER_SASL_LOGIN_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
      KAFKA_LISTENER_NAME_BROKER_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
      KAFKA_LISTENER_NAME_BROKER_SASL_OAUTHBEARER_CLIENT_CREDENTIALS_CLIENT_ID: kafka-broker
      KAFKA_LISTENER_NAME_BROKER_SASL_OAUTHBEARER_CLIENT_CREDENTIALS_CLIENT_SECRET: broker-secret
      KAFKA_LISTENER_NAME_BROKER_SASL_OAUTHBEARER_SCOPE: openid

      # CONTROLLER listener — même config OAUTHBEARER que BROKER
      KAFKA_LISTENER_NAME_CONTROLLER_OAUTHBEARER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
      KAFKA_LISTENER_NAME_CONTROLLER_OAUTHBEARER_SASL_LOGIN_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
      KAFKA_LISTENER_NAME_CONTROLLER_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
      KAFKA_LISTENER_NAME_CONTROLLER_SASL_OAUTHBEARER_CLIENT_CREDENTIALS_CLIENT_ID: kafka-broker
      KAFKA_LISTENER_NAME_CONTROLLER_SASL_OAUTHBEARER_CLIENT_CREDENTIALS_CLIENT_SECRET: broker-secret
      KAFKA_LISTENER_NAME_CONTROLLER_SASL_OAUTHBEARER_SCOPE: openid

      # EXTERNAL listener — validation des JWT des clients
      KAFKA_LISTENER_NAME_EXTERNAL_OAUTHBEARER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
      KAFKA_LISTENER_NAME_EXTERNAL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler

      # OAUTHBEARER endpoints (communs à tous les listeners)
      KAFKA_SASL_OAUTHBEARER_TOKEN_ENDPOINT_URL: http://keycloak:9090/realms/kafka/protocol/openid-connect/token
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:9090/realms/kafka/protocol/openid-connect/certs
      KAFKA_SASL_OAUTHBEARER_EXPECTED_ISSUER: http://localhost:9090/realms/kafka
      KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka-broker

      # Utiliser le client ID Keycloak (azp) comme principal Kafka
      # → kafka-producer-client devient User:kafka-producer-client
      KAFKA_SASL_OAUTHBEARER_SUB_CLAIM_NAME: azp

      # --- ACL Configuration ---
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_SUPER_USERS: "User:kafka-broker"
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"

      # Kafka 4.x — autoriser les URLs HTTP pour OAUTHBEARER (exact match)
      KAFKA_OPTS: "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:9090/realms/kafka/protocol/openid-connect/certs,http://keycloak:9090/realms/kafka/protocol/openid-connect/token"

    volumes:
      - kafka-0-data:/var/lib/kafka/data
      - ./ssl/mount:/etc/kafka/secrets/
      - ./setup-acls.sh:/tmp/setup-acls.sh:ro
      - ./setup-quotas.sh:/tmp/setup-quotas.sh:ro
      - ./admin.properties:/etc/kafka/admin.properties:ro
    ports:
      - "19092:19092"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

