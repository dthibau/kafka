# ── Atelier 9 — Kafka + OAuth/OAUTHBEARER avec Keycloak ──────────────────────
#
# 3 brokers KRaft (confluentinc/cp-server:7.7.8)
#   - PLAINTEXT:9092       → healthcheck interne + Schema Registry
#   - BROKER:9091           → inter-broker SASL_PLAINTEXT / OAUTHBEARER
#   - CONTROLLER:9093       → controller (PLAINTEXT)
#   - EXTERNAL:19092/3/4    → clients externes SASL_SSL / OAUTHBEARER
#
# Keycloak (quay.io/keycloak:26.1) sur port 9090
# Redpanda Console sur port 8080
# Schema Registry sur port 8081
# Control Center sur port 9021
# ─────────────────────────────────────────────────────────────────────────────

services:

# ── Keycloak ──────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    hostname: keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-port=9090
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak/kafka-realm.json:/opt/keycloak/data/import/kafka-realm.json:ro
    ports:
      - "9090:9090"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090 && echo -e 'GET /realms/kafka HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | head -1 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

# ── Kafka Broker 1 ────────────────────────────────────────────────────────────

  kafka-1:
    image: confluentinc/cp-server:7.7.8
    container_name: kafka-1
    hostname: kafka-1
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      # ── Node identity ──────────────────────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      CLUSTER_ID: "OAuthKafkaCluster0001AA"

      # ── Listeners ──────────────────────────────────────────────────────────
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,BROKER://0.0.0.0:9091,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092,BROKER://kafka-1:9091,EXTERNAL://localhost:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,BROKER:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_SSL"
      KAFKA_INTER_BROKER_LISTENER_NAME: "BROKER"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"

      # ── Broker / topic defaults ────────────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_METRIC_REPORTERS: io.confluent.metrics.reporter.ConfluentMetricsReporter
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      CONFLUENT_METRICS_REPORTER_TOPIC_REPLICAS: 3
      CONFLUENT_METRICS_ENABLE: "true"

      # ── SSL (listener EXTERNAL) ────────────────────────────────────────────
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: secret
      KAFKA_SSL_KEY_PASSWORD: secret
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: secret
      KAFKA_SSL_CLIENT_AUTH: requested
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

      # ── SASL / OAUTHBEARER ────────────────────────────────────────────────
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: OAUTHBEARER
      KAFKA_SASL_ENABLED_MECHANISMS: OAUTHBEARER

      # Listener BROKER — inter-broker : login + validation
      # clientId/clientSecret passés dans sasl.jaas.config (syntaxe Confluent 7.x / Kafka 3.x)
      KAFKA_LISTENER_NAME_BROKER_OAUTHBEARER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required
        clientId="kafka-broker"
        clientSecret="broker-secret"
        scope="openid";
      KAFKA_LISTENER_NAME_BROKER_OAUTHBEARER_SASL_LOGIN_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
      KAFKA_LISTENER_NAME_BROKER_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler

      # Listener EXTERNAL — validation des JWT des clients
      KAFKA_LISTENER_NAME_EXTERNAL_OAUTHBEARER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
      KAFKA_LISTENER_NAME_EXTERNAL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler

      # Endpoints OAUTHBEARER (communs à tous les listeners)
      KAFKA_SASL_OAUTHBEARER_TOKEN_ENDPOINT_URL: http://keycloak:9090/realms/kafka/protocol/openid-connect/token
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:9090/realms/kafka/protocol/openid-connect/certs
      KAFKA_SASL_OAUTHBEARER_EXPECTED_ISSUER: http://localhost:9090/realms/kafka
      KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka-broker

      KAFKA_OPTS: "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:9090/realms/kafka/protocol/openid-connect/certs,http://keycloak:9090/realms/kafka/protocol/openid-connect/token"

    volumes:
      - kafka-1-data:/var/lib/kafka/data
      - ./ssl/mount:/etc/kafka/secrets/
    ports:
      - "9092:9092"
      - "19092:19092"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka-1:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

