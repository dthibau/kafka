# ── Atelier 9.2.2 — Kafka + OAuth/OAUTHBEARER avec Keycloak ──────────────────
#
#
# Keycloak (quay.io/keycloak:26.1) sur port 9090
# ──────────────────────────────────────────────────────────────────────────────

services:

# ── Keycloak ─────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    network_mode: host
    hostname: keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-port=9090
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
      # Fixer l'issuer à localhost:9090 quel que soit le hostname de la requête
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: false
    volumes:
      - ./keycloak/kafka-realm.json:/opt/keycloak/data/import/kafka-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090 && echo -e 'GET /realms/kafka HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

